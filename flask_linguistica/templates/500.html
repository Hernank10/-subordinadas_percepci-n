{% extends "base.html" %}

{% block title %}Error del servidor - Lingüística Educativa{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto text-center">
            <div class="card">
                <div class="card-body">
                    <h1 class="display-1 text-muted mb-4">500</h1>
                    <i class="bi bi-exclamation-triangle display-1 text-warning mb-4"></i>
                    <h2 class="mb-3">¡Error interno del servidor!</h2>
                    <p class="lead mb-4">Lo sentimos, ha ocurrido un error inesperado. Por favor, intenta de nuevo más tarde.</p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ url_for('index') }}" class="btn btn-primary">
                            <i class="bi bi-house-door me-2"></i>Ir al inicio
                        </a>
                        <button onclick="location.reload()" class="btn btn-outline-primary">
                            <i class="bi bi-arrow-clockwise me-2"></i>Reintentar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
